<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>I had a weird dream...</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #ffffff;
    --ink: #0a0a0a;
    --mid: #888;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Cormorant Garamond', serif;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ════ INTRO ════ */
  #intro {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 100;
    overflow: hidden;
  }

  #intro-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 0.05s ease;
    will-change: opacity;
    pointer-events: none;
  }

  #dream-text {
    position: relative;
    font-family: Menlo, Monaco, Consolas, 'Liberation Mono', monospace;
    font-size: clamp(16px, 4.2vw, 40px);
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.05em;
    color: var(--ink);
    white-space: nowrap;
    pointer-events: none;
    animation: textAppear 1.1s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes textAppear {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #intro-enter {
    position: absolute;
    bottom: 88px; left: 50%;
    transform: translateX(-50%);
    z-index: 101;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    color: #111;
    background: transparent;
    border: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    padding: 0;
    border-radius: 0;
    cursor: pointer;
    opacity: 0.95;
    transition: opacity 0.2s ease, transform 0.1s ease;
    user-select: none;
    outline: none;
    isolation: isolate;
  }

  @keyframes intro-enter-glow-pulse {
    0%, 100% {
      opacity: 0.78;
      filter: blur(8px);
      transform: translate(-50%, -50%) scale(0.97);
      box-shadow:
        0 0 22px 14px rgba(255, 61, 90, 0.28),
        0 0 48px 28px rgba(255, 61, 90, 0.15),
        0 0 78px 42px rgba(255, 61, 90, 0.08);
    }
    50% {
      opacity: 1;
      filter: blur(13px);
      transform: translate(-50%, -50%) scale(1.06);
      box-shadow:
        0 0 34px 22px rgba(255, 61, 90, 0.4),
        0 0 64px 36px rgba(255, 61, 90, 0.22),
        0 0 98px 52px rgba(255, 61, 90, 0.12);
    }
  }

  #intro-enter::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 132px;
    height: 132px;
    border-radius: 50%;
    z-index: -1;
    pointer-events: none;
    will-change: transform, opacity, filter;
    background: radial-gradient(
      circle,
      rgba(255, 61, 90, 0.55) 0%,
      rgba(255, 61, 90, 0.22) 42%,
      rgba(255, 61, 90, 0) 72%
    );
    animation: intro-enter-glow-pulse 3.6s ease-in-out infinite;
  }
  #intro-enter:hover::before {
    animation-duration: 2.8s;
  }
  #intro-enter:hover { opacity: 1; }
  #intro-enter:active { transform: translateX(-50%) scale(0.98); }
  #intro-enter:disabled { opacity: 0; pointer-events: none; }

  /* ════ SLIDESHOW ════ */
  #slideshow {
    position: fixed; inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.025s ease;
    background: var(--bg);
    overflow: hidden;
  }

  #slideshow.visible {
    opacity: 1;
    pointer-events: all;
  }

  #slides-strip {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  .slide {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    /* Dreamlike dissolve — opacity crossfade, no hard swipe */
    will-change: opacity;
  }

  .slide-bg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    object-position: center;
    background: var(--bg);
    display: block;
  }

  .slide-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    background: #f5f5f5;
  }

  .ph-num {
    font-family: 'Space Mono', monospace;
    font-size: clamp(52px, 14vw, 110px);
    font-weight: 700;
    color: #ddd;
    line-height: 1;
  }

  .ph-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: #bbb;
    text-transform: uppercase;
  }

  .slide::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.06) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* ── Chrome ── */
  #chrome-top {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 60px;
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
    pointer-events: none;
    background: linear-gradient(to bottom, rgba(255,255,255,0.85) 0%, transparent 100%);
  }

  #chrome-top span {
    font-family: Menlo, Monaco, Consolas, 'Liberation Mono', monospace;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: #777;
  }

  #chrome-bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 20px;
    z-index: 50;
    background: linear-gradient(to top, rgba(255,255,255,0.9) 0%, transparent 100%);
  }

  .nav-btn {
    background: none; border: none; cursor: pointer;
    width: 72px; height: 72px;
    display: flex; align-items: center; justify-content: center;
    color: #333;
    opacity: 0.5;
    transition: opacity 0.2s, transform 0.12s;
    -webkit-tap-highlight-color: transparent;
    border-radius: 50%;
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 60;
  }
  .nav-btn:hover { opacity: 1; background: rgba(0,0,0,0.04); }
  .nav-btn:active { transform: translateY(-50%) scale(0.9); }
  .nav-btn:disabled { opacity: 0.12; pointer-events: none; }
  .nav-btn svg { width: 34px; height: 34px; stroke-width: 1.9; }
  #btn-prev { left: 14px; }
  #btn-next { right: 14px; }

  #counter-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 9px;
  }

  #slide-counter {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: #999;
  }

  #dots {
    display: flex; gap: 5px; align-items: center;
  }

  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #ccc;
    transition: background 0.3s, transform 0.3s;
    cursor: pointer;
  }

  .dot.active {
    background: #222;
    transform: scale(1.5);
  }

  #swipe-hint {
    position: fixed;
    bottom: 88px; left: 50%; transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.24em;
    color: #bbb;
    z-index: 51;
    white-space: nowrap;
    animation: hintLife 3.5s 1.4s forwards;
    opacity: 0;
    pointer-events: none;
  }

  @keyframes hintLife {
    0%   { opacity: 0; transform: translateX(-50%) translateY(5px); }
    15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    75%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ════ DREAM WALL — slide 9 ════ */
  #wall-slide {
    position: absolute; inset: 0;
    background: #fff;
    overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* floating messages canvas */
  #wall-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* center card */
  #wall-card {
    position: relative;
    z-index: 10;
    display: flex; flex-direction: column;
    align-items: center;
    gap: 0;
    pointer-events: all;
  }

  #wall-prompt {
    font-family: Menlo, Monaco, Consolas, 'Liberation Mono', monospace;
    font-style: italic;
    font-size: clamp(14px, 3.6vw, 26px);
    font-weight: 400;
    letter-spacing: 0.03em;
    color: #111;
    text-align: center;
    line-height: 1.25;
    margin-bottom: 28px;
    animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #wall-input-wrap {
    display: flex;
    align-items: stretch;
    gap: 0;
    width: min(340px, 88vw);
    animation: fadeUp 0.9s 0.15s cubic-bezier(0.16,1,0.3,1) both;
  }

  #wall-input {
    flex: 1;
    border: 1px solid #d0d0d0;
    border-right: none;
    border-radius: 2px 0 0 2px;
    padding: 12px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-style: normal;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: #111;
    background: #fff;
    outline: none;
    transition: border-color 0.2s;
    /* allow typing on mobile */
    touch-action: auto;
    user-select: auto;
    -webkit-user-select: auto;
  }

  #wall-input::placeholder {
    color: #bbb;
    font-style: normal;
  }

  #wall-input:focus {
    border-color: #999;
  }

  #wall-send {
    background: #FF3D5A;
    color: #fff;
    border: 1px solid #FF3D5A;
    border-radius: 0 2px 2px 0;
    padding: 12px 18px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }

  #wall-send:hover { background: #ff5c72; border-color: #ff5c72; }
  #wall-send:active { transform: scale(0.96); }
  #wall-send:disabled { background: #d4d4d4; border-color: #d4d4d4; color: #888; }

  #wall-status {
    margin-top: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: #bbb;
    text-align: center;
    height: 16px;
  }

  #wall-count {
    position: absolute;
    bottom: 90px; left: 50%; transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: #ccc;
    white-space: nowrap;
    z-index: 5;
    pointer-events: none;
  }

  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    #chrome-bottom {
      padding-bottom: max(env(safe-area-inset-bottom), 0px);
      height: calc(80px + env(safe-area-inset-bottom));
    }
  }
</style>
</head>
<body>

<!-- ════ INTRO ════ -->
<div id="intro">
  <canvas id="intro-canvas"></canvas>
  <div id="dream-text">I had a weird dream...</div>
  <button id="intro-enter" type="button" aria-label="Show me">

<!-- ════ SLIDESHOW ════ -->
<div id="slideshow">

  <div id="slides-strip">

    <!-- slides 1–8：本地漫画页（与 relase 目录下 JPEG 同序） -->
    <div class="slide" data-i="0" data-asset="1">

    <div class="slide" data-i="2" data-asset="3">
      <img class="slide-bg" src="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A//www.w3.org/2000/svg'%20width%3D'1200'%20height%3D'800'%20viewBox%3D'0%200%201200%20800'%3E%3Crect%20width%3D'1200'%20height%3D'800'%20fill%3D'%23f5f5f5'/%3E%3Ctext%20x%3D'50%25'%20y%3D'52%25'%20font-family%3D'Arial'%20font-size%3D'280'%20fill%3D'%23999'%20text-anchor%3D'middle'%20dominant-baseline%3D'middle'%3E3%3C/text%3E%3C/svg%3E" alt="Frame 3" decoding="async">

    <div class="slide" data-i="4" data-asset="5">
      <img class="slide-bg" src="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A//www.w3.org/2000/svg'%20width%3D'1200'%20height%3D'800'%20viewBox%3D'0%200%201200%20800'%3E%3Crect%20width%3D'1200'%20height%3D'800'%20fill%3D'%23f5f5f5'/%3E%3Ctext%20x%3D'50%25'%20y%3D'52%25'%20font-family%3D'Arial'%20font-size%3D'280'%20fill%3D'%23999'%20text-anchor%3D'middle'%20dominant-baseline%3D'middle'%3E5%3C/text%3E%3C/svg%3E" alt="Frame 5" decoding="async">

    <div class="slide" data-i="5" data-asset="6">

    <div class="slide" data-i="7" data-asset="8">
      <img class="slide-bg" src="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A//www.w3.org/2000/svg'%20width%3D'1200'%20height%3D'800'%20viewBox%3D'0%200%201200%20800'%3E%3Crect%20width%3D'1200'%20height%3D'800'%20fill%3D'%23f5f5f5'/%3E%3Ctext%20x%3D'50%25'%20y%3D'52%25'%20font-family%3D'Arial'%20font-size%3D'280'%20fill%3D'%23999'%20text-anchor%3D'middle'%20dominant-baseline%3D'middle'%3E8%3C/text%3E%3C/svg%3E" alt="Frame 8" decoding="async">

<script>
/* ══════════════════════════════════════
   PARTICLE INTRO
══════════════════════════════════════ */
const introCanvas = document.getElementById('intro-canvas');
const ictx        = introCanvas.getContext('2d');
const dreamEl     = document.getElementById('dream-text');
const introEl     = document.getElementById('intro');
const showEl      = document.getElementById('slideshow');
const introEnterBtn = document.getElementById('intro-enter');

let IW, IH, iParticles = [], iRaf;
let iStarted = false;
let iFinished = false;

function iResize() {
  IW = introCanvas.width  = window.innerWidth;
  IH = introCanvas.height = window.innerHeight;
}
iResize();
window.addEventListener('resize', iResize);

function sampleText(text) {
  const off = document.createElement('canvas');
  const oc  = off.getContext('2d');
  off.width = IW; off.height = IH;
  const fs = Math.min(IW * 0.048, 44);
  oc.font = `italic 400 ${fs}px Menlo, Monaco, Consolas, Liberation Mono, monospace`;
  oc.fillStyle = '#000';
  oc.textAlign = 'center';
  oc.textBaseline = 'middle';
  oc.fillText(text, IW / 2, IH / 2);
  const { data } = oc.getImageData(0, 0, IW, IH);
  const pts = [];
  const step = Math.max(2, Math.round(IW / 200));
  for (let y = 0; y < IH; y += step)
    for (let x = 0; x < IW; x += step)
      if (data[(y * IW + x) * 4 + 3] > 100) pts.push({ x, y });
  return pts;
}

class IParticle {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.size = Math.random() * 2.2 + 0.5;
    this.alpha = 0; this.live = false;
    // Random direction + speed so motion isn’t one shared “column” drifting upward
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.4 + Math.random() * 5.2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.ax = (Math.random() - 0.5) * 0.18;
    this.ay = (Math.random() - 0.5) * 0.18;
    // 更快淡出：让“空白白屏”总时长接近 1s
    this.fade = 0.018 + Math.random() * 0.018;            // 每帧衰减更快
    this.g = Math.floor(Math.random() * 35);
  }
  start(fadeInFrames = 26, disperseDelayFrames = 10) {
    this.live = true;
    this.frame = 0;
    this.fadeInFrames = fadeInFrames;
    this.disperseDelayFrames = disperseDelayFrames;
    // 粒子从很透明开始长出来，与文字淡出形成“解体”效果
    this.alpha = 0;
  }
  update() {
    if (!this.live) return;
    this.frame++;

    // 先不急着散开，让粒子在“文字位置”附近逐步显现
    const canMove = this.frame > this.disperseDelayFrames;
    if (canMove) {
      this.vx += this.ax + (Math.random() - 0.5) * 0.22;
      this.vy += this.ay + (Math.random() - 0.5) * 0.22;
      this.x += this.vx;
      this.y += this.vy;
    }

    // 先 fade-in，再 fade-out（从而做到“慢慢解体”）
    if (this.frame <= this.fadeInFrames) {
      this.alpha = Math.min(1, this.frame / this.fadeInFrames);
    } else {
      this.alpha = Math.max(0, this.alpha - this.fade);
    }

    // 尺寸衰减也稍微放慢，避免过早“消失点”
    this.size *= 0.999;
  }
  draw(c) {
    if (this.alpha <= 0) return;
    c.save(); c.globalAlpha = Math.max(0, this.alpha);
    c.fillStyle = `rgb(${this.g},${this.g},${this.g})`;
    c.beginPath(); c.arc(this.x, this.y, Math.max(0.1, this.size), 0, Math.PI * 2);
    c.fill(); c.restore();
  }
}

function iLoop() {
  ictx.clearRect(0, 0, IW, IH);
  iParticles.forEach(p => { p.update(); p.draw(ictx); });
  iRaf = requestAnimationFrame(iLoop);
}

function startIntro() {
  iParticles = sampleText('I had a weird dream...').map(p => new IParticle(p.x, p.y));
  iStarted = false;
  iFinished = false;

  // 默认只显示文字，点击后才把粒子画出来并开始运动
  introCanvas.style.opacity = '0';
  iLoop();
}

function triggerIntro() {
  if (iStarted || iFinished) return;
  if (showEl.classList.contains('visible')) return;
  if (!iParticles || iParticles.length === 0) return;
  iStarted = true;

  if (introEnterBtn) introEnterBtn.disabled = true;
  introCanvas.style.opacity = '1'; // 与粒子逐步显现同步

  const TEXT_FADE_MS = 360; // 文字慢慢解体，但更快进入“粒子态”
  const PARTICLE_FADE_IN_FRAMES = 16; // 粒子慢慢长出来（更丝滑但不拖太久）
  const PARTICLE_DISPERSE_DELAY_FRAMES = 5; // 更早开始散开，整体更“散”

  dreamEl.style.transition = `opacity ${TEXT_FADE_MS}ms cubic-bezier(0.16,1,0.3,1)`;
  // 避免 fill-mode 的 CSS animation 把 opacity 锁住
  dreamEl.style.animation = 'none';
  dreamEl.style.opacity = '0';

  // 文字淡出时，同时让粒子从透明逐步显现并在短延迟后开始散开
  iParticles.forEach(p => p.start(PARTICLE_FADE_IN_FRAMES, PARTICLE_DISPERSE_DELAY_FRAMES));

  const poll = setInterval(() => {
    if (iParticles.every(p => p.alpha <= 0)) {
      clearInterval(poll);
      cancelAnimationFrame(iRaf);
      introEl.style.transition = 'opacity 0.05s ease';
      introEl.style.opacity = '0';
      showEl.classList.add('visible');
      setTimeout(() => introEl.remove(), 50);
      iFinished = true;
    }
  }, 80);
}

if (introEnterBtn) {
  introEnterBtn.addEventListener('click', triggerIntro);
}
window.addEventListener('keydown', e => {
  if (e.key === 'Enter') triggerIntro();
});

setTimeout(startIntro, 250);


/* ══════════════════════════════════════
   SLIDESHOW
══════════════════════════════════════ */
const slides   = Array.from(document.querySelectorAll('.slide'));
const N        = slides.length;
const btnPrev  = document.getElementById('btn-prev');
const btnNext  = document.getElementById('btn-next');
const counter  = document.getElementById('slide-counter');
const dotsWrap = document.getElementById('dots');

let cur = 0, busy = false;
/** Slow crossfade between slides (dreamlike dissolve, not a film cut). */
const SLIDE_CROSSFADE_MS = 900;
const SLIDE_EASE = 'cubic-bezier(0.35, 0.02, 0.25, 1)';

slides.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.addEventListener('click', () => goTo(i));
  dotsWrap.appendChild(d);
});

function initSlideStack() {
  slides.forEach((el, i) => {
    el.style.transform = 'none';
    el.style.transition = 'none';
    el.style.opacity = i === 0 ? '1' : '0';
    el.style.zIndex = i === 0 ? '2' : '1';
  });
}

initSlideStack();

function updateUI() {
  counter.textContent = `${String(cur + 1).padStart(2,'0')} / ${String(N).padStart(2,'0')}`;
  btnPrev.disabled = cur === 0;
  btnNext.disabled = cur === N - 1;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === cur));

  // 第二帧（第2页）把前进/后退按钮做得更深更显眼
  const isFrame2 = cur === 1;
  btnPrev.style.background = (isFrame2 && !btnPrev.disabled) ? 'rgba(0,0,0,0.06)' : 'none';
  btnNext.style.background = (isFrame2 && !btnNext.disabled) ? 'rgba(0,0,0,0.06)' : 'none';
  if (!btnPrev.disabled) btnPrev.style.opacity = isFrame2 ? '0.9' : '0.5';
  if (!btnNext.disabled) btnNext.style.opacity = isFrame2 ? '0.9' : '0.5';
  if (btnPrev.disabled) btnPrev.style.opacity = '';
  if (btnNext.disabled) btnNext.style.opacity = '';

  // when wall is visible, allow input interaction
  document.getElementById('wall-slide-wrapper').style.pointerEvents =
    cur === N - 1 ? 'all' : 'none';
}

function goTo(next) {
  if (busy || next === cur || next < 0 || next >= N) return;
  busy = true;
  const prev = cur;
  cur = next;
  const elPrev = slides[prev];
  const elNext = slides[next];
  const tr = `opacity ${SLIDE_CROSSFADE_MS}ms ${SLIDE_EASE}`;

  elNext.style.transition = 'none';
  elNext.style.opacity = '0';
  elNext.style.zIndex = '3';
  elPrev.style.zIndex = '2';
  void elNext.offsetWidth;

  elNext.style.transition = tr;
  elPrev.style.transition = tr;
  elNext.style.opacity = '1';
  elPrev.style.opacity = '0';

  updateUI();
  if (cur === N - 1) initWall();

  setTimeout(() => {
    slides.forEach((el, i) => {
      el.style.transform = 'none';
      if (i === cur) {
        el.style.zIndex = '2';
        el.style.opacity = '1';
      } else {
        el.style.zIndex = '1';
        el.style.opacity = '0';
      }
    });
    busy = false;
  }, SLIDE_CROSSFADE_MS + 50);
}

btnPrev.addEventListener('click', () => goTo(cur - 1));
btnNext.addEventListener('click', () => goTo(cur + 1));
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goTo(cur + 1);
  if (e.key === 'ArrowLeft')  goTo(cur - 1);
});

let tx0 = 0, ty0 = 0, touchOnInput = false;
showEl.addEventListener('touchstart', e => {
  touchOnInput = e.target.closest('#wall-card') !== null;
  tx0 = e.touches[0].clientX;
  ty0 = e.touches[0].clientY;
}, { passive: true });

showEl.addEventListener('touchend', e => {
  if (touchOnInput) return;
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = e.changedTouches[0].clientY - ty0;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 36)
    goTo(dx < 0 ? cur + 1 : cur - 1);
}, { passive: true });

updateUI();


/* ══════════════════════════════════════
   DREAM WALL
   — floating text stored via Anthropic artifact storage
   — canvas animation: messages drift, fade
══════════════════════════════════════ */
const wallCanvas  = document.getElementById('wall-canvas');
const wctx        = wallCanvas.getContext('2d');
const wallInput   = document.getElementById('wall-input');
const wallSend    = document.getElementById('wall-send');
const wallStatus  = document.getElementById('wall-status');
const wallCount   = document.getElementById('wall-count');

let WW, WH, wRaf, wMessages = [], wallReady = false;

/** Word-wrap for canvas measureText — keeps dreams readable on narrow screens. */
function wrapWallLines(ctx, text, maxW) {
  const words = text.trim().split(/\s+/).filter(Boolean);
  if (!words.length) return [''];
  const lines = [];
  let line = '';
  for (const w of words) {
    const next = line ? `${line} ${w}` : w;
    if (ctx.measureText(next).width <= maxW) {
      line = next;
    } else {
      if (line) lines.push(line);
      if (ctx.measureText(w).width <= maxW) {
        line = w;
      } else {
        let acc = '';
        for (let i = 0; i < w.length; i++) {
          const t = acc + w[i];
          if (ctx.measureText(t).width <= maxW) acc = t;
          else {
            if (acc) lines.push(acc);
            acc = w[i];
          }
        }
        line = acc;
      }
    }
  }
  if (line) lines.push(line);
  return lines.length ? lines : [text];
}

// Floating message objects for canvas
class FloatingMsg {
  /**
   * @param {string} text
   * @param {number} seed
   * @param {{ index?: number, total?: number }} [placement] — stratified grid when both set (spread across canvas)
   */
  constructor(text, seed, placement = {}) {
    this.text = text;
    const w = Math.max(WW, 1);
    const h = Math.max(WH, 1);
    const r = mulberry32((seed | 0) ^ 0x5bd1e995);
    r(); r(); // decorrelate first draws

    const { index, total } = placement;
    if (index != null && total != null && total > 1) {
      const aspect = w / h;
      const cols = Math.max(1, Math.ceil(Math.sqrt(total * aspect)));
      const rows = Math.max(1, Math.ceil(total / cols));
      const col = index % cols;
      const row = Math.min(Math.floor(index / cols), rows - 1);
      const cellW = w / cols;
      const cellH = h / rows;
      const jx = (0.12 + r() * 0.76) * cellW;
      const jy = (0.12 + r() * 0.76) * cellH;
      this.x = col * cellW + jx;
      this.y = row * cellH + jy;
    } else {
      this.x = (0.06 + r() * 0.88) * w;
      this.y = (0.06 + r() * 0.88) * h;
    }

    // Wander in both axes so text doesn’t drift as one column
    this.vx = (r() - 0.5) * 0.52;
    this.vy = (r() - 0.5) * 0.48;
    this.baseAlpha = 0.08 + r() * 0.28;
    this.alpha = 0;
    this.targetAlpha = this.baseAlpha;
    // Slightly larger type on narrow viewports so wrapped lines stay legible
    this.size = w < 480 ? 14 + r() * 4 : 13 + r() * 6;
    this.angle = (r() - 0.5) * 0.12;
    this.born = Date.now() + r() * 6000; // stagger appearance
    this.appeared = false;
  }

  tick() {
    const now = Date.now();
    if (now < this.born) return;
    if (!this.appeared) {
      this.appeared = true;
      this.targetAlpha = this.baseAlpha;
    }
    this.alpha += (this.targetAlpha - this.alpha) * 0.03;
    this.vx += (Math.random() - 0.5) * 0.012;
    this.vy += (Math.random() - 0.5) * 0.012;
    this.x += this.vx;
    this.y += this.vy;
    // wrap around edges
    if (this.x < -200) this.x = WW + 100;
    if (this.x > WW + 200) this.x = -100;
    if (this.y < -120) this.y = WH + 40;
    if (this.y > WH + 120) this.y = -40;
  }

  draw(c) {
    if (this.alpha < 0.005) return;
    const font = `400 ${this.size}px 'Space Mono', monospace`;
    c.save();
    c.font = font;
    const maxW = Math.max(140, Math.min(Math.max(WW, 1) * 0.82, 360));
    const lines = wrapWallLines(c, this.text, maxW);
    const lineHeight = this.size * 1.38;
    const totalH = lines.length * lineHeight;

    c.globalAlpha = this.alpha;
    c.translate(this.x, this.y);
    c.rotate(this.angle);
    c.fillStyle = '#111';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    const y0 = lines.length === 1 ? 0 : -(totalH - lineHeight) / 2;
    lines.forEach((ln, i) => {
      c.fillText(ln, 0, y0 + i * lineHeight);
    });
    c.restore();
  }
}

// simple seedable RNG
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function strToSeed(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  return h;
}

function wResize() {
  WW = wallCanvas.width  = wallCanvas.offsetWidth;
  WH = wallCanvas.height = wallCanvas.offsetHeight;
}

function wLoop() {
  wctx.clearRect(0, 0, WW, WH);
  wMessages.forEach(m => { m.tick(); m.draw(wctx); });
  wRaf = requestAnimationFrame(wLoop);
}

function buildFloaters(msgs) {
  const n = msgs.length;
  wMessages = msgs.map((text, i) =>
    new FloatingMsg(text, strToSeed(text + i), { index: i, total: n }));
  wallCount.textContent = msgs.length > 0
    ? `${msgs.length} dream${msgs.length > 1 ? 's' : ''} shared`
    : '';
}

// ── Storage via window.storage (Artifact persistent KV) ──
const STORAGE_KEY = 'dream-wall-messages';

async function loadMessages() {
  try {
    const res = await window.storage.get(STORAGE_KEY, true); // shared=true
    if (res && res.value) {
      return JSON.parse(res.value);
    }
  } catch(e) {}
  return [];
}

async function saveMessages(msgs) {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(msgs), true); // shared=true
  } catch(e) {}
}

let allMessages = [];

async function initWall() {
  if (wallReady) return;
  wallReady = true;

  wResize();
  window.addEventListener('resize', wResize);
  wLoop();

  // load existing
  allMessages = await loadMessages();
  buildFloaters(allMessages);

  // seed default floating dreams if empty
  if (allMessages.length === 0) {
    const seeds = [
      'Walking into a castle and ending up in a giant room full of different breads',
      'Being hunted by a human sized pigeon. I woke up terrified xD',
      "running through a field chased by giant orange jumping tic-tac's",
      'Recurring dream that a train was headed right for our house  about to smash me in my bed and my parents and brother were driving it.',
      'I was in my childhood home kitchen as an adult. I detached my left arm and started chopping it up to cook it.',
      "I'm at summer camp & aliens invaded it. They turned my brother into a toy truck. woke up crying every time",
    ];
    allMessages = seeds;
    await saveMessages(allMessages);
    buildFloaters(allMessages);
  }
}

async function submitDream() {
  const text = wallInput.value.trim();
  if (!text) return;

  wallSend.disabled = true;
  wallStatus.textContent = '…';

  // Add to storage
  allMessages = await loadMessages();
  allMessages.push(text);
  await saveMessages(allMessages);

  // Add to canvas immediately
  const newMsg = new FloatingMsg(text, strToSeed(text + allMessages.length));
  newMsg.born = Date.now() + 300;
  wMessages.push(newMsg);
  wallCount.textContent = `${allMessages.length} dream${allMessages.length > 1 ? 's' : ''} shared`;

  wallInput.value = '';
  wallStatus.textContent = 'released ✦';
  setTimeout(() => {
    wallStatus.textContent = '';
    wallSend.disabled = false;
  }, 2000);
}

wallSend.addEventListener('click', submitDream);
wallInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); submitDream(); }
});

// allow typing on mobile
wallInput.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
wallInput.addEventListener('focus', () => {
  // push card up slightly on mobile keyboard open
  setTimeout(() => {
    wallInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 300);
});
</script>
</body>
