<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>I had a weird dream...</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #ffffff;
    --ink: #0a0a0a;
    --mid: #888;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Cormorant Garamond', serif;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ════ INTRO ════ */
  #intro {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 100;
    overflow: hidden;
  }

  #intro-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 0.05s ease;
    will-change: opacity;
    pointer-events: none;
  }

  #dream-text {
    position: relative;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 7.5vw, 84px);
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.06em;
    color: var(--ink);
    white-space: nowrap;
    pointer-events: none;
    animation: textAppear 1.1s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes textAppear {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #intro-enter {
    position: absolute;
    bottom: 88px; left: 50%;
    transform: translateX(-50%);
    z-index: 101;
    font-family: 'Space Mono', monospace;
    font-size: 14.5px; /* about +30% */
    letter-spacing: 0.22em;
    color: #111;
    background: transparent;
    border: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    padding: 0;
    border-radius: 0;
    cursor: pointer;
    opacity: 0.95;
    transition: opacity 0.2s ease, transform 0.1s ease;
    user-select: none;
    outline: none;
  }
  #intro-enter:hover { opacity: 1; }
  #intro-enter:active { transform: translateX(-50%) scale(0.98); }
  #intro-enter:disabled { opacity: 0; pointer-events: none; }

  /* ════ SLIDESHOW ════ */
  #slideshow {
    position: fixed; inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.075s ease;
    background: var(--bg);
    overflow: hidden;
  }

  #slideshow.visible {
    opacity: 1;
    pointer-events: all;
  }

  #slides-strip {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  .slide {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    will-change: transform, opacity;
  }

  .slide-bg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    object-position: center;
    background: var(--bg);
    display: block;
  }

  .slide-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    background: #f5f5f5;
  }

  .ph-num {
    font-family: 'Space Mono', monospace;
    font-size: clamp(52px, 14vw, 110px);
    font-weight: 700;
    color: #ddd;
    line-height: 1;
  }

  .ph-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: #bbb;
    text-transform: uppercase;
  }

  .slide::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.06) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* ── Chrome ── */
  #chrome-top {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 60px;
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
    pointer-events: none;
    background: linear-gradient(to bottom, rgba(255,255,255,0.85) 0%, transparent 100%);
  }

  #chrome-top span {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: #777;
  }

  #chrome-bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    z-index: 50;
    background: linear-gradient(to top, rgba(255,255,255,0.9) 0%, transparent 100%);
  }

  .nav-btn {
    background: none; border: none; cursor: pointer;
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    color: #333;
    opacity: 0.5;
    transition: opacity 0.2s, transform 0.12s;
    -webkit-tap-highlight-color: transparent;
    border-radius: 50%;
  }
  .nav-btn:hover { opacity: 1; background: rgba(0,0,0,0.04); }
  .nav-btn:active { transform: scale(0.87); }
  .nav-btn:disabled { opacity: 0.12; pointer-events: none; }
  .nav-btn svg { width: 22px; height: 22px; stroke-width: 1.6; }

  #counter-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 9px;
  }

  #slide-counter {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: #999;
  }

  #dots {
    display: flex; gap: 5px; align-items: center;
  }

  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #ccc;
    transition: background 0.3s, transform 0.3s;
    cursor: pointer;
  }

  .dot.active {
    background: #222;
    transform: scale(1.5);
  }

  #swipe-hint {
    position: fixed;
    bottom: 88px; left: 50%; transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.24em;
    color: #bbb;
    z-index: 51;
    white-space: nowrap;
    animation: hintLife 3.5s 1.4s forwards;
    opacity: 0;
    pointer-events: none;
  }

  @keyframes hintLife {
    0%   { opacity: 0; transform: translateX(-50%) translateY(5px); }
    15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    75%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ════ DREAM WALL — slide 9 ════ */
  #wall-slide {
    position: absolute; inset: 0;
    background: #fff;
    overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* floating messages canvas */
  #wall-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* center card */
  #wall-card {
    position: relative;
    z-index: 10;
    display: flex; flex-direction: column;
    align-items: center;
    gap: 0;
    pointer-events: all;
  }

  #wall-prompt {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(22px, 6vw, 42px);
    font-weight: 300;
    letter-spacing: 0.04em;
    color: #111;
    text-align: center;
    line-height: 1.25;
    margin-bottom: 28px;
    animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #wall-input-wrap {
    display: flex;
    align-items: stretch;
    gap: 0;
    width: min(340px, 88vw);
    animation: fadeUp 0.9s 0.15s cubic-bezier(0.16,1,0.3,1) both;
  }

  #wall-input {
    flex: 1;
    border: 1px solid #d0d0d0;
    border-right: none;
    border-radius: 2px 0 0 2px;
    padding: 12px 14px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-style: italic;
    color: #111;
    background: #fff;
    outline: none;
    transition: border-color 0.2s;
    /* allow typing on mobile */
    touch-action: auto;
    user-select: auto;
    -webkit-user-select: auto;
  }

  #wall-input::placeholder {
    color: #bbb;
    font-style: italic;
  }

  #wall-input:focus {
    border-color: #999;
  }

  #wall-send {
    background: #111;
    color: #fff;
    border: 1px solid #111;
    border-radius: 0 2px 2px 0;
    padding: 12px 18px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }

  #wall-send:hover { background: #333; }
  #wall-send:active { transform: scale(0.96); }
  #wall-send:disabled { background: #bbb; border-color: #bbb; }

  #wall-status {
    margin-top: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: #bbb;
    text-align: center;
    height: 16px;
  }

  #wall-count {
    position: absolute;
    bottom: 90px; left: 50%; transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: #ccc;
    white-space: nowrap;
    z-index: 5;
    pointer-events: none;
  }

  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    #chrome-bottom {
      padding-bottom: max(env(safe-area-inset-bottom), 0px);
      height: calc(80px + env(safe-area-inset-bottom));
    }
  }
</style>
</head>

<script>
/* ══════════════════════════════════════
   PARTICLE INTRO
══════════════════════════════════════ */
const introCanvas = document.getElementById('intro-canvas');
const ictx        = introCanvas.getContext('2d');
const dreamEl     = document.getElementById('dream-text');
const introEl     = document.getElementById('intro');
const showEl      = document.getElementById('slideshow');
const introEnterBtn = document.getElementById('intro-enter');

let IW, IH, iParticles = [], iRaf;
let iStarted = false;
let iFinished = false;

function iResize() {
  IW = introCanvas.width  = window.innerWidth;
  IH = introCanvas.height = window.innerHeight;
}
iResize();
window.addEventListener('resize', iResize);

function sampleText(text) {
  const off = document.createElement('canvas');
  const oc  = off.getContext('2d');
  off.width = IW; off.height = IH;
  const fs = Math.min(IW * 0.075, 84);
  oc.font = `300 italic ${fs}px 'Cormorant Garamond', serif`;
  oc.fillStyle = '#000';
  oc.textAlign = 'center';
  oc.textBaseline = 'middle';
  oc.fillText(text, IW / 2, IH / 2);
  const { data } = oc.getImageData(0, 0, IW, IH);
  const pts = [];
  const step = Math.max(2, Math.round(IW / 200));
  for (let y = 0; y < IH; y += step)
    for (let x = 0; x < IW; x += step)
      if (data[(y * IW + x) * 4 + 3] > 100) pts.push({ x, y });
  return pts;
}

class IParticle {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.size = Math.random() * 2.2 + 0.5;
    this.alpha = 1; this.live = false;
    // 初始速度略加大：让“变成粒子后”散开更多一点
    this.vx = (Math.random() - 0.5) * 1.7;
    this.vy = -(Math.random() * 4.6 + 1.9);
    this.ax = (Math.random() - 0.5) * 0.095;
    // 淡出更慢：降低 alpha 衰减速度
    this.fade = 0.004 + Math.random() * 0.008;
    this.g = Math.floor(Math.random() * 35);
  }
  start() { this.live = true; }
  update() {
    if (!this.live) return;
    this.vx += this.ax; this.x += this.vx; this.y += this.vy;
    this.alpha -= this.fade; this.size *= 0.9992;
  }
  draw(c) {
    if (this.alpha <= 0) return;
    c.save(); c.globalAlpha = Math.max(0, this.alpha);
    c.fillStyle = `rgb(${this.g},${this.g},${this.g})`;
    c.beginPath(); c.arc(this.x, this.y, Math.max(0.1, this.size), 0, Math.PI * 2);
    c.fill(); c.restore();
  }
}

function iLoop() {
  ictx.clearRect(0, 0, IW, IH);
  iParticles.forEach(p => { p.update(); p.draw(ictx); });
  iRaf = requestAnimationFrame(iLoop);
}

function startIntro() {
  iParticles = sampleText('I had a weird dream...').map(p => new IParticle(p.x, p.y));
  iStarted = false;
  iFinished = false;

  // 默认只显示文字，点击后才把粒子画出来并开始运动
  introCanvas.style.opacity = '0';
  iLoop();
}

function triggerIntro() {
  if (iStarted || iFinished) return;
  if (showEl.classList.contains('visible')) return;
  if (!iParticles || iParticles.length === 0) return;
  iStarted = true;

  if (introEnterBtn) introEnterBtn.disabled = true;
  introCanvas.style.opacity = '0'; // 先让文字淡出，再显示粒子

  const TEXT_FADE_MS = 150;
  const TRANSFORM_HOLD_MS = 140;
  const SCATTER_START_DELAY_MS = TRANSFORM_HOLD_MS;

  dreamEl.style.transition = `opacity ${TEXT_FADE_MS}ms`;
  // 避免 fill-mode 的 CSS animation 把 opacity 锁住
  dreamEl.style.animation = 'none';
  dreamEl.style.opacity = '0';

  // 先让文字淡出；文字消失后再“变成粒子”，随后再开始散开+淡出
  setTimeout(() => {
    introCanvas.style.opacity = '1'; // 让粒子点阵出现
    setTimeout(() => {
      iParticles.forEach(p => p.start()); // 开始运动与淡出
    }, SCATTER_START_DELAY_MS);
  }, TEXT_FADE_MS);

  const poll = setInterval(() => {
    if (iParticles.every(p => p.alpha <= 0)) {
      clearInterval(poll);
      cancelAnimationFrame(iRaf);
      introEl.style.transition = 'opacity 0.175s ease';
      introEl.style.opacity = '0';
      showEl.classList.add('visible');
      setTimeout(() => introEl.remove(), 180);
      iFinished = true;
    }
  }, 80);
}

if (introEnterBtn) {
  introEnterBtn.addEventListener('click', triggerIntro);
}
window.addEventListener('keydown', e => {
  if (e.key === 'Enter') triggerIntro();
});

setTimeout(startIntro, 250);


/* ══════════════════════════════════════
   SLIDESHOW
══════════════════════════════════════ */
const slides   = Array.from(document.querySelectorAll('.slide'));
const N        = slides.length;
const btnPrev  = document.getElementById('btn-prev');
const btnNext  = document.getElementById('btn-next');
const counter  = document.getElementById('slide-counter');
const dotsWrap = document.getElementById('dots');

let cur = 0, busy = false;
const DUR = 620;

slides.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.addEventListener('click', () => goTo(i));
  dotsWrap.appendChild(d);
});

function setSlide(idx, tx, instant) {
  const el = slides[idx];
  el.style.transition = instant ? 'none'
    : `transform ${DUR}ms cubic-bezier(0.77,0,0.175,1), opacity ${DUR}ms ease`;
  el.style.transform = `translateX(${tx}%)`;
  el.style.opacity   = tx === 0 ? '1' : '0';
  el.style.zIndex    = tx === 0 ? '2' : '1';
}

slides.forEach((_, i) => setSlide(i, i === 0 ? 0 : 100, true));

function updateUI() {
  counter.textContent = `${String(cur + 1).padStart(2,'0')} / ${String(N).padStart(2,'0')}`;
  btnPrev.disabled = cur === 0;
  btnNext.disabled = cur === N - 1;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === cur));

  // 第二帧（第2页）把前进/后退按钮做得更深更显眼
  const isFrame2 = cur === 1;
  btnPrev.style.background = (isFrame2 && !btnPrev.disabled) ? 'rgba(0,0,0,0.06)' : 'none';
  btnNext.style.background = (isFrame2 && !btnNext.disabled) ? 'rgba(0,0,0,0.06)' : 'none';
  if (!btnPrev.disabled) btnPrev.style.opacity = isFrame2 ? '0.9' : '0.5';
  if (!btnNext.disabled) btnNext.style.opacity = isFrame2 ? '0.9' : '0.5';
  if (btnPrev.disabled) btnPrev.style.opacity = '';
  if (btnNext.disabled) btnNext.style.opacity = '';

  // when wall is visible, allow input interaction
  document.getElementById('wall-slide-wrapper').style.pointerEvents =
    cur === N - 1 ? 'all' : 'none';
}

function goTo(next) {
  if (busy || next === cur || next < 0 || next >= N) return;
  busy = true;
  const prev = cur, dir = next > prev ? 1 : -1;
  cur = next;
  setSlide(next, dir * 100, true);
  void slides[next].offsetWidth;
  setSlide(prev, -dir * 100, false);
  setSlide(next, 0, false);
  updateUI();
  if (cur === N - 1) initWall();
  setTimeout(() => {
    slides.forEach((_, i) => { if (i !== cur) setSlide(i, 100, true); });
    busy = false;
  }, DUR + 40);
}

btnPrev.addEventListener('click', () => goTo(cur - 1));
btnNext.addEventListener('click', () => goTo(cur + 1));
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goTo(cur + 1);
  if (e.key === 'ArrowLeft')  goTo(cur - 1);
});

let tx0 = 0, ty0 = 0, touchOnInput = false;
showEl.addEventListener('touchstart', e => {
  touchOnInput = e.target.closest('#wall-card') !== null;
  tx0 = e.touches[0].clientX;
  ty0 = e.touches[0].clientY;
}, { passive: true });

showEl.addEventListener('touchend', e => {
  if (touchOnInput) return;
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = e.changedTouches[0].clientY - ty0;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 36)
    goTo(dx < 0 ? cur + 1 : cur - 1);
}, { passive: true });

updateUI();


/* ══════════════════════════════════════
   DREAM WALL
   — floating text stored via Anthropic artifact storage
   — canvas animation: messages drift, fade
══════════════════════════════════════ */
const wallCanvas  = document.getElementById('wall-canvas');
const wctx        = wallCanvas.getContext('2d');
const wallInput   = document.getElementById('wall-input');
const wallSend    = document.getElementById('wall-send');
const wallStatus  = document.getElementById('wall-status');
const wallCount   = document.getElementById('wall-count');

let WW, WH, wRaf, wMessages = [], wallReady = false;

// Floating message objects for canvas
class FloatingMsg {
  constructor(text, seed) {
    this.text = text;
    // deterministic start from seed so reloads feel stable
    const r = mulberry32(seed);
    this.x    = r() * WW;
    this.y    = r() * WH;
    this.vx   = (r() - 0.5) * 0.35;
    this.vy   = -(r() * 0.4 + 0.08);
    this.baseAlpha = 0.08 + r() * 0.28;
    this.alpha = 0;
    this.targetAlpha = this.baseAlpha;
    this.size = 13 + r() * 6;
    this.angle = (r() - 0.5) * 0.12;
    this.born = Date.now() + r() * 6000; // stagger appearance
    this.appeared = false;
  }

  tick() {
    const now = Date.now();
    if (now < this.born) return;
    if (!this.appeared) {
      this.appeared = true;
      this.targetAlpha = this.baseAlpha;
    }
    this.alpha += (this.targetAlpha - this.alpha) * 0.03;
    this.x += this.vx;
    this.y += this.vy;
    // wrap around edges
    if (this.x < -200) this.x = WW + 100;
    if (this.x > WW + 200) this.x = -100;
    if (this.y < -40) this.y = WH + 20;
    if (this.y > WH + 40) this.y = -20;
  }

  draw(c) {
    if (this.alpha < 0.005) return;
    c.save();
    c.globalAlpha = this.alpha;
    c.translate(this.x, this.y);
    c.rotate(this.angle);
    c.font = `300 italic ${this.size}px 'Cormorant Garamond', serif`;
    c.fillStyle = '#111';
    c.textAlign = 'center';
    c.fillText(this.text, 0, 0);
    c.restore();
  }
}

// simple seedable RNG
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function strToSeed(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  return h;
}

function wResize() {
  WW = wallCanvas.width  = wallCanvas.offsetWidth;
  WH = wallCanvas.height = wallCanvas.offsetHeight;
}

function wLoop() {
  wctx.clearRect(0, 0, WW, WH);
  wMessages.forEach(m => { m.tick(); m.draw(wctx); });
  wRaf = requestAnimationFrame(wLoop);
}

function buildFloaters(msgs) {
  wMessages = msgs.map((text, i) => new FloatingMsg(text, strToSeed(text + i)));
  wallCount.textContent = msgs.length > 0
    ? `${msgs.length} dream${msgs.length > 1 ? 's' : ''} shared`
    : '';
}

// ── Storage via window.storage (Artifact persistent KV) ──
const STORAGE_KEY = 'dream-wall-messages';

async function loadMessages() {
  try {
    const res = await window.storage.get(STORAGE_KEY, true); // shared=true
    if (res && res.value) {
      return JSON.parse(res.value);
    }
  } catch(e) {}
  return [];
}

async function saveMessages(msgs) {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(msgs), true); // shared=true
  } catch(e) {}
}

let allMessages = [];

async function initWall() {
  if (wallReady) return;
  wallReady = true;

  wResize();
  window.addEventListener('resize', wResize);
  wLoop();

  // load existing
  allMessages = await loadMessages();
  buildFloaters(allMessages);

  // seed a few poetic starter messages if empty
  if (allMessages.length === 0) {
    const seeds = [
      'to wake up without an alarm',
      'a room full of light',
      'to finally finish the painting',
      'a train ride with no destination',
      'to call my mom more',
    ];
    allMessages = seeds;
    await saveMessages(allMessages);
    buildFloaters(allMessages);
  }
}

async function submitDream() {
  const text = wallInput.value.trim();
  if (!text) return;

  wallSend.disabled = true;
  wallStatus.textContent = '…';

  // Add to storage
  allMessages = await loadMessages();
  allMessages.push(text);
  await saveMessages(allMessages);

  // Add to canvas immediately
  const newMsg = new FloatingMsg(text, strToSeed(text + allMessages.length));
  newMsg.born = Date.now() + 300;
  wMessages.push(newMsg);
  wallCount.textContent = `${allMessages.length} dream${allMessages.length > 1 ? 's' : ''} shared`;

  wallInput.value = '';
  wallStatus.textContent = 'released ✦';
  setTimeout(() => {
    wallStatus.textContent = '';
    wallSend.disabled = false;
  }, 2000);
}

wallSend.addEventListener('click', submitDream);
wallInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); submitDream(); }
});

// allow typing on mobile
wallInput.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
wallInput.addEventListener('focus', () => {
  // push card up slightly on mobile keyboard open
  setTimeout(() => {
    wallInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 300);
});
</script>
</body>
</html>
