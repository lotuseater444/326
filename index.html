<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>I had a weird dream...</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #ffffff;
    --ink: #0a0a0a;
    --mid: #888;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Cormorant Garamond', serif;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ════ INTRO ════ */
  #intro {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 100;
    overflow: hidden;
  }

  #intro-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 0.05s ease;
    will-change: opacity;
    pointer-events: none;
  }

  #dream-text {
    position: relative;
    font-family: Menlo, Monaco, Consolas, 'Liberation Mono', monospace;
    font-size: clamp(16px, 4.2vw, 40px);
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.05em;
    color: var(--ink);
    white-space: nowrap;
    pointer-events: none;
    animation: textAppear 1.1s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes textAppear {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #intro-enter {
    position: absolute;
    bottom: 88px; left: 50%;
    transform: translateX(-50%);
    z-index: 101;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    color: #111;
    background: transparent;
    border: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    padding: 0;
    border-radius: 0;
    cursor: pointer;
    opacity: 0.95;
    transition: opacity 0.2s ease, transform 0.1s ease;
    user-select: none;
    outline: none;
    isolation: isolate;
  }

  @keyframes intro-enter-glow-pulse {
    0%, 100% {
      opacity: 0.78;
      filter: blur(8px);
      transform: translate(-50%, -50%) scale(0.97);
      box-shadow:
        0 0 22px 14px rgba(255, 61, 90, 0.28),
        0 0 48px 28px rgba(255, 61, 90, 0.15),
        0 0 78px 42px rgba(255, 61, 90, 0.08);
    }
    50% {
      opacity: 1;
      filter: blur(13px);
      transform: translate(-50%, -50%) scale(1.06);
      box-shadow:
        0 0 34px 22px rgba(255, 61, 90, 0.4),
        0 0 64px 36px rgba(255, 61, 90, 0.22),
        0 0 98px 52px rgba(255, 61, 90, 0.12);
    }
  }

  #intro-enter::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 132px;
    height: 132px;
    border-radius: 50%;
    z-index: -1;
    pointer-events: none;
    will-change: transform, opacity, filter;
    background: radial-gradient(
      circle,
      rgba(255, 61, 90, 0.55) 0%,
      rgba(255, 61, 90, 0.22) 42%,
      rgba(255, 61, 90, 0) 72%
    );
    animation: intro-enter-glow-pulse 3.6s ease-in-out infinite;
  }
  #intro-enter:hover::before {
    animation-duration: 2.8s;
  }
  #intro-enter:hover { opacity: 1; }
  #intro-enter:active { transform: translateX(-50%) scale(0.98); }
  #intro-enter:disabled { opacity: 0; pointer-events: none; }

  /* ════ SLIDESHOW ════ */
  #slideshow {
    position: fixed; inset: 0;
    opacity: 0;
    pointer-events: none;
    /* Snappy handoff from intro (particles → first slide) */
    transition: opacity 0.05s ease-out;
    background: var(--bg);
    overflow: hidden;
  }

  #slideshow.visible {
    opacity: 1;
    pointer-events: all;
  }

  @media (prefers-reduced-motion: reduce) {
    #slideshow {
      transition-duration: 0.03s;
    }
  }

  #slides-strip {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  .slide {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    /* Crossfade only: opacity, no translate (timing set in JS: 0.9s ease-in-out) */
    will-change: opacity;
  }

  /* Center images in the slide box (wall uses its own layout) */
  .slide:not(#wall-slide-wrapper) {
    display: block;
  }

  .slide-bg {
    background: transparent;
    display: block;
    object-fit: contain;
    object-position: center;
    margin: 0;
  }

  /* Enlarged, very blurred copy of the same frame fills letterboxing */
  .slide:not(#wall-slide-wrapper) .slide-backdrop {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 100%;
    height: 100%;
    transform: translate(-50%, -50%) scale(1.42);
    object-fit: cover;
    object-position: center;
    /* Muted vs sharp foreground — frosted “glass behind the pane” */
    filter: blur(52px) saturate(0.52) brightness(1.08) contrast(0.93);
    opacity: 0.88;
    z-index: 0;
    pointer-events: none;
    margin: 0;
  }

  .slide:not(#wall-slide-wrapper) .slide-bg {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    z-index: 1;
  }

  /* Soft fade into page bg at left/right (not on dream wall) */
  .slide:not(#wall-slide-wrapper)::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background-image:
      linear-gradient(to right, var(--bg) 0%, transparent min(22vw, 180px)),
      linear-gradient(to left, var(--bg) 0%, transparent min(22vw, 180px));
  }

  /* Mobile: full viewport width, no horizontal scroll; swipe targets comic slides */
  @media (max-width: 640px) {
    html {
      overflow-x: hidden;
      width: 100%;
      max-width: 100%;
      overscroll-behavior-x: none;
    }
    body {
      overflow-x: hidden;
      width: 100%;
      max-width: 100%;
      overscroll-behavior-x: none;
    }
    #intro {
      max-width: 100%;
      overflow-x: hidden;
    }
    #intro-canvas {
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
    }
    #slideshow,
    #slides-strip {
      max-width: 100%;
      overflow-x: hidden;
      width: 100%;
    }
    #slides-strip {
      touch-action: none;
    }
    #wall-input-wrap,
    #wall-input,
    #wall-send {
      touch-action: auto;
    }
    .slide {
      max-width: 100%;
      width: 100%;
      left: 0;
      overflow: hidden;
    }
    .slide:not(#wall-slide-wrapper) .slide-bg {
      left: 0;
      top: 0;
      transform: none;
      width: 100%;
      height: 100%;
      max-width: none;
      max-height: none;
      object-fit: contain;
      object-position: center;
    }
    .slide:not(#wall-slide-wrapper) .slide-backdrop {
      left: 50%;
      top: 50%;
      width: 100%;
      height: 100%;
      transform: translate(-50%, -50%) scale(1.22);
      object-fit: cover;
      object-position: center;
    }
    #wall-slide {
      max-width: 100%;
      overflow-x: hidden;
      box-sizing: border-box;
      /* Symmetric vertical padding so prompt + input block sits in true viewport center */
      --wall-vpad: max(100px, calc(88px + env(safe-area-inset-bottom, 0px)));
      padding-top: max(var(--wall-vpad), env(safe-area-inset-top, 0px));
      padding-bottom: var(--wall-vpad);
      padding-left: max(20px, env(safe-area-inset-left, 0px));
      padding-right: max(20px, env(safe-area-inset-right, 0px));
      min-height: 100%;
      min-height: 100dvh;
      justify-content: center;
      align-items: center;
    }
    #wall-card {
      width: 100%;
      max-width: min(360px, 100%);
      box-sizing: border-box;
    }
    #wall-prompt {
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      padding: 0 4px;
    }
    #wall-input-wrap {
      width: 100%;
      max-width: min(340px, 100%);
    }

    /* No side vignette — show full frame edge to edge */
    .slide:not(#wall-slide-wrapper)::before {
      content: none;
      display: none;
    }
  }

  .slide-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    background: #f5f5f5;
  }

  .ph-num {
    font-family: 'Space Mono', monospace;
    font-size: clamp(52px, 14vw, 110px);
    font-weight: 700;
    color: #ddd;
    line-height: 1;
  }

  .ph-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: #bbb;
    text-transform: uppercase;
  }

  /* ── Bottom chrome (no gradient fade) ── */
  #chrome-bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 72px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 20px;
    z-index: 50;
    background: transparent;
    pointer-events: none;
  }

  #chrome-bottom .nav-btn {
    pointer-events: auto;
  }

  .nav-btn {
    background: none; border: none; cursor: pointer;
    width: 72px; height: 72px;
    display: flex; align-items: center; justify-content: center;
    color: #1a1a1a;
    opacity: 0.82;
    transition: opacity 0.2s, transform 0.12s;
    -webkit-tap-highlight-color: transparent;
    border-radius: 50%;
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 60;
    outline: none;
  }
  .nav-btn:hover { opacity: 1; background: rgba(0,0,0,0.04); }
  .nav-btn:active:not(:disabled) {
    transform: translateY(-50%) scale(0.96);
  }
  .nav-btn:disabled { opacity: 0.12; pointer-events: none; }
  .nav-btn svg { width: 34px; height: 34px; stroke-width: 1.9; }
  #btn-prev { left: 14px; }
  #btn-next { right: 14px; }

  #swipe-hint {
    position: fixed;
    bottom: 80px; left: 50%; transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.24em;
    color: #bbb;
    z-index: 51;
    white-space: nowrap;
    animation: hintLife 3.5s 1.4s forwards;
    opacity: 0;
    pointer-events: none;
  }

  @keyframes hintLife {
    0%   { opacity: 0; transform: translateX(-50%) translateY(5px); }
    15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    75%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ════ DREAM WALL — final slide ════ */
  #wall-slide {
    position: absolute; inset: 0;
    background: #fff;
    overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* floating messages canvas */
  #wall-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* center card */
  #wall-card {
    position: relative;
    z-index: 10;
    display: flex; flex-direction: column;
    align-items: center;
    gap: 0;
    pointer-events: all;
  }

  #wall-prompt {
    font-family: Menlo, Monaco, Consolas, 'Liberation Mono', monospace;
    font-style: italic;
    font-size: clamp(14px, 3.6vw, 26px);
    font-weight: 400;
    letter-spacing: 0.03em;
    color: #111;
    text-align: center;
    line-height: 1.25;
    margin-bottom: 28px;
    animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #wall-input-wrap {
    display: flex;
    align-items: stretch;
    gap: 0;
    width: min(340px, 88vw);
    animation: fadeUp 0.9s 0.15s cubic-bezier(0.16,1,0.3,1) both;
  }

  #wall-input {
    flex: 1;
    border: 1px solid #d0d0d0;
    border-right: none;
    border-radius: 2px 0 0 2px;
    padding: 12px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-style: normal;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: #111;
    background: #fff;
    outline: none;
    transition: border-color 0.2s;
    /* allow typing on mobile */
    touch-action: auto;
    user-select: auto;
    -webkit-user-select: auto;
  }

  #wall-input::placeholder {
    color: #bbb;
    font-style: normal;
  }

  #wall-input:focus {
    border-color: #999;
  }

  #wall-send {
    background: #FF3D5A;
    color: #fff;
    border: 1px solid #FF3D5A;
    border-radius: 0 2px 2px 0;
    padding: 12px 18px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }

  #wall-send:hover { background: #ff5c72; border-color: #ff5c72; }
  #wall-send:active { transform: scale(0.96); }
  #wall-send:disabled { background: #d4d4d4; border-color: #d4d4d4; color: #888; }

  #wall-status {
    margin-top: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: #bbb;
    text-align: center;
    height: 16px;
  }

  #wall-count {
    position: absolute;
    bottom: 88px; left: 50%; transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: #aaa;
    white-space: nowrap;
    z-index: 5;
    pointer-events: none;
  }

  #wall-count .wall-count-num {
    color: #FF3D5A;
    font-weight: 700;
    letter-spacing: 0.12em;
  }

  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    #chrome-bottom {
      padding-bottom: max(env(safe-area-inset-bottom), 0px);
      height: calc(72px + env(safe-area-inset-bottom));
    }
  }

  /* After base .nav-btn — mobile only: bottom arrows + hint/count clear of thumbs */
  @media (max-width: 640px) {
    /* Image slides: chevrons hug the bottom of the screen (still clears home indicator) */
    .nav-btn {
      top: auto;
      bottom: max(6px, calc(2px + env(safe-area-inset-bottom, 0px)));
      transform: none;
    }
    .nav-btn:active:not(:disabled) {
      transform: scale(0.96);
    }
    #swipe-hint {
      bottom: max(92px, calc(78px + env(safe-area-inset-bottom, 0px)));
    }
    #wall-count {
      bottom: max(148px, calc(134px + env(safe-area-inset-bottom, 0px)));
    }
  }
</style>
</head>
<body>

<!-- ════ INTRO ════ -->
<div id="intro">
  <canvas id="intro-canvas"></canvas>
  <div id="dream-text">I had a weird dream...</div>
  <button id="intro-enter" type="button" aria-label="Show me">
    [ show me ]
  </button>
</div>

<!-- ════ SLIDESHOW ════ -->
<div id="slideshow">

  <div id="slides-strip">

    <!-- slides 1–7： dream comic frames -->
    <div class="slide" data-i="0" data-asset="slide-1.png">
      <img class="slide-backdrop" src="slide-1.png" alt="" aria-hidden="true" decoding="async" draggable="false">
      <img class="slide-bg" src="slide-1.png" alt="Dream collage — babysitting" decoding="async" fetchpriority="high" draggable="false">
    </div>
    <div class="slide" data-i="1" data-asset="slide-2.png">
      <img class="slide-backdrop" src="slide-2.png" alt="" aria-hidden="true" decoding="async" draggable="false">
      <img class="slide-bg" src="slide-2.png" alt="Dream collage — phone and baby" decoding="async" draggable="false">
    </div>
    <div class="slide" data-i="2" data-asset="slide-3.png">
      <img class="slide-backdrop" src="slide-3.png" alt="" aria-hidden="true" decoding="async" draggable="false">
      <img class="slide-bg" src="slide-3.png" alt="Dream collage — fireplace, wand, and creature" decoding="async" draggable="false">
    </div>
    <div class="slide" data-i="3" data-asset="slide-4.png">
      <img class="slide-backdrop" src="slide-4.png" alt="" aria-hidden="true" decoding="async" draggable="false">
      <img class="slide-bg" src="slide-4.png" alt="Dream collage — fire, purple creature, blue cube, screaming figure" decoding="async" draggable="false">
    </div>
    <div class="slide" data-i="4" data-asset="slide-5.png">
      <img class="slide-backdrop" src="slide-5.png" alt="" aria-hidden="true" decoding="async" draggable="false">
      <img class="slide-bg" src="slide-5.png" alt="Dream collage — burnt baby, text, and fire" decoding="async" draggable="false">
    </div>
    <div class="slide" data-i="5" data-asset="slide-6.png">
      <img class="slide-backdrop" src="slide-6.png" alt="" aria-hidden="true" decoding="async" draggable="false">
      <img class="slide-bg" src="slide-6.png" alt="Dream collage — figure, eyes in blue beam, fix the baby text" decoding="async" draggable="false">
    </div>
    <div class="slide" data-i="6" data-asset="slide-7.png">
      <img class="slide-backdrop" src="slide-7.png" alt="" aria-hidden="true" decoding="async" draggable="false">
      <img class="slide-bg" src="slide-7.png" alt="Illustration — waking up, What the…!?" decoding="async" draggable="false">
    </div>

    <!-- dream wall -->
    <div class="slide" data-i="7" id="wall-slide-wrapper">
      <div id="wall-slide">
        <canvas id="wall-canvas"></canvas>

        <div id="wall-card">
          <div id="wall-prompt">that was mine, what was yours?</div>
          <div id="wall-input-wrap">
            <input id="wall-input" type="text" maxlength="80"
              placeholder="" autocomplete="off"
              autocorrect="off" spellcheck="false" enterkeyhint="send">
            <button id="wall-send">tell me</button>
          </div>
          <div id="wall-status"></div>
        </div>

        <div id="wall-count"></div>
      </div>
    </div>

  </div><!-- /slides-strip -->

  <div id="swipe-hint">swipe to explore</div>

  <div id="chrome-bottom">
    <button class="nav-btn" id="btn-prev" disabled aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="nav-btn" id="btn-next" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

</div><!-- /slideshow -->

<script>
/* ══════════════════════════════════════
   PARTICLE INTRO
══════════════════════════════════════ */
const introCanvas = document.getElementById('intro-canvas');
const ictx        = introCanvas.getContext('2d');
const dreamEl     = document.getElementById('dream-text');
const introEl     = document.getElementById('intro');
const showEl      = document.getElementById('slideshow');
const introEnterBtn = document.getElementById('intro-enter');
const mqReduceMotionIntro = window.matchMedia('(prefers-reduced-motion: reduce)');

let IW, IH, iParticles = [], iRaf;
let iStarted = false;
let iFinished = false;
let introRevealMs = 50;

function iResize() {
  IW = introCanvas.width  = window.innerWidth;
  IH = introCanvas.height = window.innerHeight;
}
iResize();
window.addEventListener('resize', iResize);

function sampleText(text) {
  const off = document.createElement('canvas');
  const oc  = off.getContext('2d', { willReadFrequently: true }) || off.getContext('2d');
  off.width = IW; off.height = IH;
  const fs = Math.min(IW * 0.048, 44);
  oc.font = `italic 400 ${fs}px Menlo, Monaco, Consolas, Liberation Mono, monospace`;
  oc.fillStyle = '#000';
  oc.textAlign = 'center';
  oc.textBaseline = 'middle';
  oc.fillText(text, IW / 2, IH / 2);
  const { data } = oc.getImageData(0, 0, IW, IH);
  const pts = [];
  const narrow = IW <= 640;
  /* Fewer samples on phones = lighter getImageData scan + fewer particles = steadier RAF */
  const step = narrow
    ? Math.max(5, Math.round(IW / 56))
    : Math.max(2, Math.round(IW / 200));
  for (let y = 0; y < IH; y += step)
    for (let x = 0; x < IW; x += step)
      if (data[(y * IW + x) * 4 + 3] > 100) pts.push({ x, y });
  const cap = narrow ? 2000 : 6000;
  if (pts.length > cap) {
    const stride = Math.ceil(pts.length / cap);
    return pts.filter((_, i) => i % stride === 0);
  }
  return pts;
}

class IParticle {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.size = Math.random() * 2.2 + 0.5;
    this.alpha = 0; this.live = false;
    // Random direction + speed so motion isn’t one shared “column” drifting upward
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.4 + Math.random() * 5.2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.ax = (Math.random() - 0.5) * 0.18;
    this.ay = (Math.random() - 0.5) * 0.18;
    // 更快淡出：让“空白白屏”总时长接近 1s
    this.fade = 0.018 + Math.random() * 0.018;            // 每帧衰减更快
    this.g = Math.floor(Math.random() * 35);
  }
  start(fadeInFrames = 26, disperseDelayFrames = 10) {
    this.live = true;
    this.frame = 0;
    this.fadeInFrames = fadeInFrames;
    this.disperseDelayFrames = disperseDelayFrames;
    // 粒子从很透明开始长出来，与文字淡出形成“解体”效果
    this.alpha = 0;
  }
  update() {
    if (!this.live) return;
    this.frame++;

    // 先不急着散开，让粒子在“文字位置”附近逐步显现
    const canMove = this.frame > this.disperseDelayFrames;
    if (canMove) {
      this.vx += this.ax + (Math.random() - 0.5) * 0.22;
      this.vy += this.ay + (Math.random() - 0.5) * 0.22;
      this.x += this.vx;
      this.y += this.vy;
    }

    // 先 fade-in，再 fade-out（从而做到“慢慢解体”）
    if (this.frame <= this.fadeInFrames) {
      this.alpha = Math.min(1, this.frame / this.fadeInFrames);
    } else {
      this.alpha = Math.max(0, this.alpha - this.fade);
    }

    // 尺寸衰减也稍微放慢，避免过早“消失点”
    this.size *= 0.999;
  }
  draw(c) {
    if (this.alpha <= 0) return;
    c.save(); c.globalAlpha = Math.max(0, this.alpha);
    c.fillStyle = `rgb(${this.g},${this.g},${this.g})`;
    c.beginPath(); c.arc(this.x, this.y, Math.max(0.1, this.size), 0, Math.PI * 2);
    c.fill(); c.restore();
  }
}

function iLoop() {
  ictx.clearRect(0, 0, IW, IH);
  iParticles.forEach(p => { p.update(); p.draw(ictx); });

  if (iStarted && !iFinished && iParticles.length > 0 && iParticles.every(p => p.alpha <= 0)) {
    introEl.style.transition = `opacity ${introRevealMs}ms ease-out`;
    introEl.style.opacity = '0';
    showEl.classList.add('visible');
    setTimeout(() => {
      introEl.remove();
      iFinished = true;
    }, introRevealMs + 24);
    return;
  }

  iRaf = requestAnimationFrame(iLoop);
}

function startIntro() {
  iParticles = sampleText('I had a weird dream...').map(p => new IParticle(p.x, p.y));
  iStarted = false;
  iFinished = false;

  // 默认只显示文字，点击后才把粒子画出来并开始运动
  introCanvas.style.opacity = '0';
  iLoop();
}

function triggerIntro() {
  if (iStarted || iFinished) return;
  if (showEl.classList.contains('visible')) return;
  if (!iParticles || iParticles.length === 0) return;
  iStarted = true;

  if (introEnterBtn) introEnterBtn.disabled = true;
  introCanvas.style.opacity = '1'; // 与粒子逐步显现同步

  const TEXT_FADE_MS = 360; // 文字慢慢解体，但更快进入“粒子态”
  const PARTICLE_FADE_IN_FRAMES = 16; // 粒子慢慢长出来（更丝滑但不拖太久）
  const PARTICLE_DISPERSE_DELAY_FRAMES = 5; // 更早开始散开，整体更“散”

  dreamEl.style.transition = `opacity ${TEXT_FADE_MS}ms cubic-bezier(0.16,1,0.3,1)`;
  // 避免 fill-mode 的 CSS animation 把 opacity 锁住
  dreamEl.style.animation = 'none';
  dreamEl.style.opacity = '0';

  // 文字淡出时，同时让粒子从透明逐步显现并在短延迟后开始散开
  iParticles.forEach(p => p.start(PARTICLE_FADE_IN_FRAMES, PARTICLE_DISPERSE_DELAY_FRAMES));

  introRevealMs = mqReduceMotionIntro.matches ? 24 : 50;
}

if (introEnterBtn) {
  introEnterBtn.addEventListener('click', triggerIntro);
}
window.addEventListener('keydown', e => {
  if (e.key === 'Enter') triggerIntro();
});

setTimeout(startIntro, 250);


/* ══════════════════════════════════════
   SLIDESHOW
══════════════════════════════════════ */
const slides      = Array.from(document.querySelectorAll('.slide'));
const N           = slides.length;
const btnPrev     = document.getElementById('btn-prev');
const btnNext     = document.getElementById('btn-next');
const slidesStrip = document.getElementById('slides-strip');

let cur = 0, busy = false;
/** Simultaneous crossfade: outgoing 1→0, incoming 0→1; no motion on .slide. */
const SLIDE_CROSSFADE_MS = 900;
const SLIDE_EASE = 'ease-in-out';

function setSlideTransition(el, value) {
  el.style.transition = value;
  el.style.webkitTransition = value;
}

function initSlideStack() {
  slides.forEach((el, i) => {
    el.style.transform = 'none';
    setSlideTransition(el, 'none');
    el.style.opacity = i === 0 ? '1' : '0';
    el.style.zIndex = i === 0 ? '2' : '1';
  });
}

initSlideStack();

function updateUI() {
  btnPrev.disabled = cur === 0;
  btnNext.disabled = cur === N - 1;

  // 第二帧（第2页）把前进/后退按钮做得更深更显眼
  const isFrame2 = cur === 1;
  btnPrev.style.background = (isFrame2 && !btnPrev.disabled) ? 'rgba(0,0,0,0.06)' : 'none';
  btnNext.style.background = (isFrame2 && !btnNext.disabled) ? 'rgba(0,0,0,0.06)' : 'none';
  if (!btnPrev.disabled) btnPrev.style.opacity = isFrame2 ? '1' : '';
  if (!btnNext.disabled) btnNext.style.opacity = isFrame2 ? '1' : '';
  if (btnPrev.disabled) btnPrev.style.opacity = '';
  if (btnNext.disabled) btnNext.style.opacity = '';

  // when wall is visible, allow input interaction
  document.getElementById('wall-slide-wrapper').style.pointerEvents =
    cur === N - 1 ? 'all' : 'none';
}

function goTo(next) {
  if (busy || next === cur || next < 0 || next >= N) return;
  busy = true;
  const prev = cur;
  cur = next;
  const elPrev = slides[prev];
  const elNext = slides[next];
  const tr = `opacity ${SLIDE_CROSSFADE_MS}ms ${SLIDE_EASE}`;

  setSlideTransition(elNext, 'none');
  elNext.style.opacity = '0';
  elNext.style.zIndex = '3';
  elPrev.style.zIndex = '2';
  void elNext.offsetWidth;

  setSlideTransition(elNext, tr);
  setSlideTransition(elPrev, tr);
  elNext.style.opacity = '1';
  elPrev.style.opacity = '0';

  updateUI();
  if (cur === N - 1) initWall();

  setTimeout(() => {
    slides.forEach((el, i) => {
      el.style.transform = 'none';
      setSlideTransition(el, 'none');
      if (i === cur) {
        el.style.zIndex = '2';
        el.style.opacity = '1';
      } else {
        el.style.zIndex = '1';
        el.style.opacity = '0';
      }
    });
    busy = false;
  }, SLIDE_CROSSFADE_MS + 50);
}

btnPrev.addEventListener('click', () => goTo(cur - 1));
btnNext.addEventListener('click', () => goTo(cur + 1));
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goTo(cur + 1);
  if (e.key === 'ArrowLeft')  goTo(cur - 1);
});

let swipe0 = null;
const SWIPE_MIN_PX = 42;

function swipeIgnoreTarget(t) {
  return t && (t.closest('#wall-input-wrap') || t.closest('.nav-btn') || t.closest('#chrome-bottom'));
}

slidesStrip.addEventListener('touchstart', e => {
  if (!showEl.classList.contains('visible')) return;
  if (swipeIgnoreTarget(e.target)) { swipe0 = null; return; }
  swipe0 = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });

slidesStrip.addEventListener('touchend', e => {
  if (!swipe0) return;
  const x = e.changedTouches[0].clientX;
  const y = e.changedTouches[0].clientY;
  const dx = x - swipe0.x;
  const dy = y - swipe0.y;
  swipe0 = null;
  if (Math.abs(dx) < SWIPE_MIN_PX) return;
  if (Math.abs(dx) < Math.abs(dy) * 1.15) return;
  goTo(dx < 0 ? cur + 1 : cur - 1);
}, { passive: true });

slidesStrip.addEventListener('touchcancel', () => { swipe0 = null; }, { passive: true });

updateUI();


/* ══════════════════════════════════════
   DREAM WALL
   — floating text stored via Anthropic artifact storage
   — canvas animation: messages drift, fade
══════════════════════════════════════ */
const wallCanvas  = document.getElementById('wall-canvas');
const wctx        = wallCanvas.getContext('2d');
const wallInput   = document.getElementById('wall-input');
const wallSend    = document.getElementById('wall-send');
const wallStatus  = document.getElementById('wall-status');
const wallCount   = document.getElementById('wall-count');

let WW, WH, wRaf, wMessages = [], wallReady = false;

/** Word-wrap for canvas measureText — keeps dreams readable on narrow screens. */
function wrapWallLines(ctx, text, maxW) {
  const words = text.trim().split(/\s+/).filter(Boolean);
  if (!words.length) return [''];
  const lines = [];
  let line = '';
  for (const w of words) {
    const next = line ? `${line} ${w}` : w;
    if (ctx.measureText(next).width <= maxW) {
      line = next;
    } else {
      if (line) lines.push(line);
      if (ctx.measureText(w).width <= maxW) {
        line = w;
      } else {
        let acc = '';
        for (let i = 0; i < w.length; i++) {
          const t = acc + w[i];
          if (ctx.measureText(t).width <= maxW) acc = t;
          else {
            if (acc) lines.push(acc);
            acc = w[i];
          }
        }
        line = acc;
      }
    }
  }
  if (line) lines.push(line);
  return lines.length ? lines : [text];
}

// Floating message objects for canvas
class FloatingMsg {
  /**
   * @param {string} text
   * @param {number} seed
   * @param {{ index?: number, total?: number }} [placement] — stratified grid when both set (spread across canvas)
   */
  constructor(text, seed, placement = {}) {
    this.text = text;
    const w = Math.max(WW, 1);
    const h = Math.max(WH, 1);
    const r = mulberry32((seed | 0) ^ 0x5bd1e995);
    r(); r(); // decorrelate first draws

    const { index, total } = placement;
    if (index != null && total != null && total > 1) {
      const aspect = w / h;
      const cols = Math.max(1, Math.ceil(Math.sqrt(total * aspect)));
      const rows = Math.max(1, Math.ceil(total / cols));
      const col = index % cols;
      const row = Math.min(Math.floor(index / cols), rows - 1);
      const cellW = w / cols;
      const cellH = h / rows;
      const jx = (0.12 + r() * 0.76) * cellW;
      const jy = (0.12 + r() * 0.76) * cellH;
      this.x = col * cellW + jx;
      this.y = row * cellH + jy;
    } else {
      this.x = (0.06 + r() * 0.88) * w;
      this.y = (0.06 + r() * 0.88) * h;
    }

    // Wander in both axes so text doesn’t drift as one column
    this.vx = (r() - 0.5) * 0.52;
    this.vy = (r() - 0.5) * 0.48;
    this.baseAlpha = 0.08 + r() * 0.28;
    this.alpha = 0;
    this.targetAlpha = this.baseAlpha;
    // Slightly larger type on narrow viewports so wrapped lines stay legible
    this.size = w < 480 ? 14 + r() * 4 : 13 + r() * 6;
    this.angle = (r() - 0.5) * 0.12;
    this.born = Date.now() + r() * 6000; // stagger appearance
    this.appeared = false;
  }

  tick() {
    const now = Date.now();
    if (now < this.born) return;
    if (!this.appeared) {
      this.appeared = true;
      this.targetAlpha = this.baseAlpha;
    }
    this.alpha += (this.targetAlpha - this.alpha) * 0.03;
    this.vx += (Math.random() - 0.5) * 0.012;
    this.vy += (Math.random() - 0.5) * 0.012;
    this.x += this.vx;
    this.y += this.vy;
    // wrap around edges
    if (this.x < -200) this.x = WW + 100;
    if (this.x > WW + 200) this.x = -100;
    if (this.y < -120) this.y = WH + 40;
    if (this.y > WH + 120) this.y = -40;
  }

  draw(c) {
    if (this.alpha < 0.005) return;
    const font = `400 ${this.size}px 'Space Mono', monospace`;
    c.save();
    c.font = font;
    const maxW = Math.max(140, Math.min(Math.max(WW, 1) * 0.82, 360));
    const lines = wrapWallLines(c, this.text, maxW);
    const lineHeight = this.size * 1.38;
    const totalH = lines.length * lineHeight;

    c.globalAlpha = this.alpha;
    c.translate(this.x, this.y);
    c.rotate(this.angle);
    c.fillStyle = '#111';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    const y0 = lines.length === 1 ? 0 : -(totalH - lineHeight) / 2;
    lines.forEach((ln, i) => {
      c.fillText(ln, 0, y0 + i * lineHeight);
    });
    c.restore();
  }
}

// simple seedable RNG
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function strToSeed(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  return h;
}

function wResize() {
  WW = wallCanvas.width  = wallCanvas.offsetWidth;
  WH = wallCanvas.height = wallCanvas.offsetHeight;
}

function wLoop() {
  wctx.clearRect(0, 0, WW, WH);
  wMessages.forEach(m => { m.tick(); m.draw(wctx); });
  wRaf = requestAnimationFrame(wLoop);
}

function setWallCountDisplay(n) {
  if (!wallCount) return;
  if (n <= 0) {
    wallCount.textContent = '';
    return;
  }
  const word = n > 1 ? 'dreams' : 'dream';
  wallCount.innerHTML =
    `<span class="wall-count-num">${n}</span> ${word} shared`;
}

function buildFloaters(msgs) {
  const n = msgs.length;
  wMessages = msgs.map((text, i) =>
    new FloatingMsg(text, strToSeed(text + i), { index: i, total: n }));
  setWallCountDisplay(msgs.length);
}

// ── Storage via window.storage (Artifact persistent KV) ──
const STORAGE_KEY = 'dream-wall-messages';

async function loadMessages() {
  try {
    const res = await window.storage.get(STORAGE_KEY, true); // shared=true
    if (res && res.value) {
      return JSON.parse(res.value);
    }
  } catch(e) {}
  return [];
}

async function saveMessages(msgs) {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(msgs), true); // shared=true
  } catch(e) {}
}

let allMessages = [];

async function initWall() {
  if (wallReady) return;
  wallReady = true;

  wResize();
  window.addEventListener('resize', wResize);
  wLoop();

  // load existing
  allMessages = await loadMessages();
  buildFloaters(allMessages);

  // seed default floating dreams if empty
  if (allMessages.length === 0) {
    const seeds = [
      'Walking into a castle and ending up in a giant room full of different breads',
      'Being hunted by a human sized pigeon. I woke up terrified xD',
      "running through a field chased by giant orange jumping tic-tac's",
      'Recurring dream that a train was headed right for our house  about to smash me in my bed and my parents and brother were driving it.',
      'I was in my childhood home kitchen as an adult. I detached my left arm and started chopping it up to cook it.',
      "I'm at summer camp & aliens invaded it. They turned my brother into a toy truck. woke up crying every time",
    ];
    allMessages = seeds;
    await saveMessages(allMessages);
    buildFloaters(allMessages);
  }
}

async function submitDream() {
  const text = wallInput.value.trim();
  if (!text) return;

  wallSend.disabled = true;
  wallStatus.textContent = '…';

  // Add to storage
  allMessages = await loadMessages();
  allMessages.push(text);
  await saveMessages(allMessages);

  // Add to canvas immediately
  const newMsg = new FloatingMsg(text, strToSeed(text + allMessages.length));
  newMsg.born = Date.now() + 300;
  wMessages.push(newMsg);
  setWallCountDisplay(allMessages.length);

  wallInput.value = '';
  wallStatus.textContent = 'released ✦';
  setTimeout(() => {
    wallStatus.textContent = '';
    wallSend.disabled = false;
  }, 2000);
}

wallSend.addEventListener('click', submitDream);
wallInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); submitDream(); }
});

// allow typing on mobile
wallInput.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
wallInput.addEventListener('focus', () => {
  // push card up slightly on mobile keyboard open
  setTimeout(() => {
    wallInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 300);
});
</script>
