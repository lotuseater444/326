<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>this is my dream</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #ffffff;
    --ink: #0a0a0a;
    --mid: #888;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Cormorant Garamond', serif;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ════ INTRO ════ */
  #intro {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 100;
    overflow: hidden;
  }

  #intro-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  #dream-text {
    position: relative;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 7.5vw, 84px);
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.06em;
    color: var(--ink);
    white-space: nowrap;
    pointer-events: none;
    animation: textAppear 1.1s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes textAppear {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ════ SLIDESHOW ════ */
  #slideshow {
    position: fixed; inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.9s ease;
    background: var(--bg);
    overflow: hidden;
  }

  #slideshow.visible {
    opacity: 1;
    pointer-events: all;
  }

  #slides-strip {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  .slide {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    will-change: transform, opacity;
  }

  .slide-bg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    object-position: center;
    background: var(--bg);
    display: block;
  }

  .slide-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    background: #f5f5f5;
  }

  .ph-num {
    font-family: 'Space Mono', monospace;
    font-size: clamp(52px, 14vw, 110px);
    font-weight: 700;
    color: #ddd;
    line-height: 1;
  }

  .ph-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: #bbb;
    text-transform: uppercase;
  }

  .slide::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.06) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* ── Chrome ── */
  #chrome-top {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 60px;
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
    pointer-events: none;
    background: linear-gradient(to bottom, rgba(255,255,255,0.85) 0%, transparent 100%);
  }

  #chrome-top span {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: #777;
  }

  #chrome-bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    z-index: 50;
    background: linear-gradient(to top, rgba(255,255,255,0.9) 0%, transparent 100%);
  }

  .nav-btn {
    background: none; border: none; cursor: pointer;
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    color: #333;
    opacity: 0.5;
    transition: opacity 0.2s, transform 0.12s;
    -webkit-tap-highlight-color: transparent;
    border-radius: 50%;
  }
  .nav-btn:hover { opacity: 1; background: rgba(0,0,0,0.04); }
  .nav-btn:active { transform: scale(0.87); }
  .nav-btn:disabled { opacity: 0.12; pointer-events: none; }
  .nav-btn svg { width: 22px; height: 22px; stroke-width: 1.6; }

  #counter-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 9px;
  }

  #slide-counter {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: #999;
  }

  #dots {
    display: flex; gap: 5px; align-items: center;
  }

  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #ccc;
    transition: background 0.3s, transform 0.3s;
    cursor: pointer;
  }

  .dot.active {
    background: #222;
    transform: scale(1.5);
  }

  #swipe-hint {
    position: fixed;
    bottom: 88px; left: 50%; transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.24em;
    color: #bbb;
    z-index: 51;
    white-space: nowrap;
    animation: hintLife 3.5s 1.4s forwards;
    opacity: 0;
    pointer-events: none;
  }

  @keyframes hintLife {
    0%   { opacity: 0; transform: translateX(-50%) translateY(5px); }
    15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    75%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ════ DREAM WALL — slide 9 ════ */
  #wall-slide {
    position: absolute; inset: 0;
    background: #fff;
    overflow: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* floating messages canvas */
  #wall-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* center card */
  #wall-card {
    position: relative;
    z-index: 10;
    display: flex; flex-direction: column;
    align-items: center;
    gap: 0;
    pointer-events: all;
  }

  #wall-prompt {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(22px, 6vw, 42px);
    font-weight: 300;
    letter-spacing: 0.04em;
    color: #111;
    text-align: center;
    line-height: 1.25;
    margin-bottom: 28px;
    animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #wall-input-wrap {
    display: flex;
    align-items: stretch;
    gap: 0;
    width: min(340px, 88vw);
    animation: fadeUp 0.9s 0.15s cubic-bezier(0.16,1,0.3,1) both;
  }

  #wall-input {
    flex: 1;
    border: 1px solid #d0d0d0;
    border-right: none;
    border-radius: 2px 0 0 2px;
    padding: 12px 14px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-style: italic;
    color: #111;
    background: #fff;
    outline: none;
    transition: border-color 0.2s;
    /* allow typing on mobile */
    touch-action: auto;
    user-select: auto;
    -webkit-user-select: auto;
  }

  #wall-input::placeholder {
    color: #bbb;
    font-style: italic;
  }

  #wall-input:focus {
    border-color: #999;
  }

  #wall-send {
    background: #111;
    color: #fff;
    border: 1px solid #111;
    border-radius: 0 2px 2px 0;
    padding: 12px 18px;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }

  #wall-send:hover { background: #333; }
  #wall-send:active { transform: scale(0.96); }
  #wall-send:disabled { background: #bbb; border-color: #bbb; }

  #wall-status {
    margin-top: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: #bbb;
    text-align: center;
    height: 16px;
  }

  #wall-count {
    position: absolute;
    bottom: 90px; left: 50%; transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: #ccc;
    white-space: nowrap;
    z-index: 5;
    pointer-events: none;
  }

  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    #chrome-bottom {
      padding-bottom: max(env(safe-area-inset-bottom), 0px);
      height: calc(80px + env(safe-area-inset-bottom));
    }
  }
</style>
</head>
<body>

<!-- ════ INTRO ════ -->
<div id="intro">
  <canvas id="intro-canvas"></canvas>
  <div id="dream-text">this is my dream</div>
</div>

<!-- ════ SLIDESHOW ════ -->
<div id="slideshow">

  <div id="slides-strip">

    <!-- slides 1–8：本地漫画页（与 relase 目录下 JPEG 同序） -->
    <div class="slide" data-i="0" data-asset="1.JPEG">
      <img class="slide-bg" src="1封面.JPEG" alt="漫画第 1 页" decoding="async" fetchpriority="high">
    </div>
    <div class="slide" data-i="1" data-asset="1封面.JPEG">
      <img class="slide-bg" src="in.JPEG" alt="封面" decoding="async">
    </div>
    <div class="slide" data-i="2" data-asset="2 4.JPEG">
      <img class="slide-bg" src="2%204.JPEG" alt="漫画第 3 页" decoding="async">
    </div>
    <div class="slide" data-i="3" data-asset="3.JPEG">
      <img class="slide-bg" src="3.JPEG" alt="漫画第 4 页" decoding="async">
    </div>
    <div class="slide" data-i="4" data-asset="4.JPEG">
      <img class="slide-bg" src="4.JPEG" alt="漫画第 5 页" decoding="async">
    </div>
    <div class="slide" data-i="5" data-asset="5.JPEG">
      <img class="slide-bg" src="5.JPEG" alt="漫画第 6 页" decoding="async">
    </div>
    <div class="slide" data-i="6" data-asset="6.JPEG">
      <img class="slide-bg" src="6.JPEG" alt="漫画第 7 页" decoding="async">
    </div>
    <div class="slide" data-i="7" data-asset="in.JPEG">
      <img class="slide-bg" src="in.JPEG" alt="漫画第 8 页" decoding="async">
    </div>

    <!-- slide 9: dream wall -->
    <div class="slide" data-i="8" id="wall-slide-wrapper">
      <div id="wall-slide">
        <canvas id="wall-canvas"></canvas>

        <div id="wall-card">
          <div id="wall-prompt">now tell me about yours</div>
          <div id="wall-input-wrap">
            <input id="wall-input" type="text" maxlength="80"
              placeholder="my dream is…" autocomplete="off"
              autocorrect="off" spellcheck="false" enterkeyhint="send">
            <button id="wall-send">send</button>
          </div>
          <div id="wall-status"></div>
        </div>

        <div id="wall-count"></div>
      </div>
    </div>

  </div><!-- /slides-strip -->

  <div id="chrome-top"><span>this is my dream</span></div>
  <div id="swipe-hint">swipe to explore</div>

  <div id="chrome-bottom">
    <button class="nav-btn" id="btn-prev" disabled aria-label="Previous">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div id="counter-wrap">
      <div id="dots"></div>
      <span id="slide-counter">01 / 09</span>
    </div>
    <button class="nav-btn" id="btn-next" aria-label="Next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

</div><!-- /slideshow -->

<script>
/* ══════════════════════════════════════
   PARTICLE INTRO
══════════════════════════════════════ */
const introCanvas = document.getElementById('intro-canvas');
const ictx        = introCanvas.getContext('2d');
const dreamEl     = document.getElementById('dream-text');
const introEl     = document.getElementById('intro');
const showEl      = document.getElementById('slideshow');

let IW, IH, iParticles = [], iRaf;
const INTRO_HOLD_MS = 500;    // 停留 2s：文字保持显示，粒子点阵不出现
const INTRO_DISPERSE_MS = 800; // 粒子“消散”持续时长（并与文字淡出同步）
let iLastT = 0;
let iExited = false;
let iDispersing = false;

function iResize() {
  IW = introCanvas.width  = window.innerWidth;
  IH = introCanvas.height = window.innerHeight;
}
iResize();
window.addEventListener('resize', iResize);

function sampleText(text) {
  const off = document.createElement('canvas');
  const oc  = off.getContext('2d');
  off.width = IW; off.height = IH;
  const fs = Math.min(IW * 0.075, 84);
  oc.font = `300 italic ${fs}px 'Cormorant Garamond', serif`;
  oc.fillStyle = '#000';
  oc.textAlign = 'center';
  oc.textBaseline = 'middle';
  oc.fillText(text, IW / 2, IH / 2);
  const { data } = oc.getImageData(0, 0, IW, IH);
  const pts = [];
  const step = Math.max(2, Math.round(IW / 200));
  for (let y = 0; y < IH; y += step)
    for (let x = 0; x < IW; x += step)
      if (data[(y * IW + x) * 4 + 3] > 100) pts.push({ x, y });
  return pts;
}

class IParticle {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.size = Math.random() * 2.2 + 0.5;
    // 初始不显示粒子点阵；等到开始“消散”时再 start() 点亮
    this.alpha = 0; this.live = false;
    this.vx = (Math.random() - 0.5) * 1.4;
    this.vy = -(Math.random() * 4 + 1.5);
    this.ax = (Math.random() - 0.5) * 0.07;
    this.ageMs = 0;
    this.lifeMs = INTRO_DISPERSE_MS; // 统一寿命，确保淡出更丝滑且可与文字同步
    this.g = Math.floor(Math.random() * 35);
  }
  start() {
    this.live = true;
    this.ageMs = 0;
    this.alpha = 1;
  }
  update(dt) {
    if (!this.live) return;
    const f = dt / 16.6667; // 以 60fps 为基准缩放，保证不同刷新率下观感一致
    this.ageMs += dt;

    // 线性衰减：寿命到期时 alpha 精确归零
    this.alpha = Math.max(0, 1 - this.ageMs / this.lifeMs);

    this.vx += this.ax * f;
    this.x += this.vx * f;
    this.y += this.vy * f;
    this.size *= Math.pow(0.998, f);
  }
  draw(c) {
    if (this.alpha <= 0) return;
    c.save(); c.globalAlpha = Math.max(0, this.alpha);
    c.fillStyle = `rgb(${this.g},${this.g},${this.g})`;
    c.beginPath(); c.arc(this.x, this.y, Math.max(0.1, this.size), 0, Math.PI * 2);
    c.fill(); c.restore();
  }
}

function iLoop(now) {
  if (!iLastT) iLastT = now;
  const dt = Math.min(48, Math.max(0, now - iLastT));
  iLastT = now;
  ictx.clearRect(0, 0, IW, IH);
  let allDead = true;
  iParticles.forEach(p => {
    p.update(dt);
    p.draw(ictx);
    if (p.alpha > 0) allDead = false;
  });

  // 粒子消散完后立刻进入退出动画，避免 setInterval 轮询带来的停顿
  if (iDispersing && allDead && !iExited) {
    iExited = true;
    introEl.style.transition = 'opacity 0.7s ease';
    introEl.style.opacity = '0';
    showEl.classList.add('visible');
    setTimeout(() => introEl.remove(), 800);
    return;
  }

  iRaf = requestAnimationFrame(iLoop);
}

function startIntro() {
  iParticles = sampleText('this is my dream').map(p => new IParticle(p.x, p.y));
  iLastT = 0;
  iExited = false;
  iDispersing = false;
  iLoop(performance.now());

  setTimeout(() => {
    iDispersing = true;

    // #dream-text 有 CSS animation（fill-mode: both）会“锁住 opacity”，所以要先关掉动画再淡出
    dreamEl.style.animation = 'none';
    dreamEl.style.transition = `opacity ${INTRO_DISPERSE_MS}ms cubic-bezier(0.16,1,0.3,1)`;
    dreamEl.style.opacity = '0';

    iParticles.forEach(p => p.start());
  }, INTRO_HOLD_MS);
}

// 不依赖字体加载完成：避免“看起来像需要点击/激活才开始”
setTimeout(startIntro, 250);


/* ══════════════════════════════════════
   SLIDESHOW
══════════════════════════════════════ */
const slides   = Array.from(document.querySelectorAll('.slide'));
const N        = slides.length;
const btnPrev  = document.getElementById('btn-prev');
const btnNext  = document.getElementById('btn-next');
const counter  = document.getElementById('slide-counter');
const dotsWrap = document.getElementById('dots');

let cur = 0, busy = false;
const DUR = 620;

slides.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.addEventListener('click', () => goTo(i));
  dotsWrap.appendChild(d);
});

function setSlide(idx, tx, instant) {
  const el = slides[idx];
  el.style.transition = instant ? 'none'
    : `transform ${DUR}ms cubic-bezier(0.77,0,0.175,1), opacity ${DUR}ms ease`;
  el.style.transform = `translateX(${tx}%)`;
  el.style.opacity   = tx === 0 ? '1' : '0';
  el.style.zIndex    = tx === 0 ? '2' : '1';
}

slides.forEach((_, i) => setSlide(i, i === 0 ? 0 : 100, true));

function updateUI() {
  counter.textContent = `${String(cur + 1).padStart(2,'0')} / ${String(N).padStart(2,'0')}`;
  btnPrev.disabled = cur === 0;
  btnNext.disabled = cur === N - 1;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === cur));
  // when wall is visible, allow input interaction
  document.getElementById('wall-slide-wrapper').style.pointerEvents =
    cur === N - 1 ? 'all' : 'none';
}

function goTo(next) {
  if (busy || next === cur || next < 0 || next >= N) return;
  busy = true;
  const prev = cur, dir = next > prev ? 1 : -1;
  cur = next;
  setSlide(next, dir * 100, true);
  void slides[next].offsetWidth;
  setSlide(prev, -dir * 100, false);
  setSlide(next, 0, false);
  updateUI();
  if (cur === N - 1) initWall();
  setTimeout(() => {
    slides.forEach((_, i) => { if (i !== cur) setSlide(i, 100, true); });
    busy = false;
  }, DUR + 40);
}

btnPrev.addEventListener('click', () => goTo(cur - 1));
btnNext.addEventListener('click', () => goTo(cur + 1));
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goTo(cur + 1);
  if (e.key === 'ArrowLeft')  goTo(cur - 1);
});

let tx0 = 0, ty0 = 0, touchOnInput = false;
showEl.addEventListener('touchstart', e => {
  touchOnInput = e.target.closest('#wall-card') !== null;
  tx0 = e.touches[0].clientX;
  ty0 = e.touches[0].clientY;
}, { passive: true });

showEl.addEventListener('touchend', e => {
  if (touchOnInput) return;
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = e.changedTouches[0].clientY - ty0;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 36)
    goTo(dx < 0 ? cur + 1 : cur - 1);
}, { passive: true });

updateUI();


/* ══════════════════════════════════════
   DREAM WALL
   — floating text stored via Anthropic artifact storage
   — canvas animation: messages drift, fade
══════════════════════════════════════ */
const wallCanvas  = document.getElementById('wall-canvas');
const wctx        = wallCanvas.getContext('2d');
const wallInput   = document.getElementById('wall-input');
const wallSend    = document.getElementById('wall-send');
const wallStatus  = document.getElementById('wall-status');
const wallCount   = document.getElementById('wall-count');

let WW, WH, wRaf, wMessages = [], wallReady = false;

// Floating message objects for canvas
class FloatingMsg {
  constructor(text, seed) {
    this.text = text;
    // deterministic start from seed so reloads feel stable
    const r = mulberry32(seed);
    this.x    = r() * WW;
    this.y    = r() * WH;
    this.vx   = (r() - 0.5) * 0.35;
    this.vy   = -(r() * 0.4 + 0.08);
    this.baseAlpha = 0.08 + r() * 0.28;
    this.alpha = 0;
    this.targetAlpha = this.baseAlpha;
    this.size = 13 + r() * 6;
    this.angle = (r() - 0.5) * 0.12;
    this.born = Date.now() + r() * 6000; // stagger appearance
    this.appeared = false;
  }

  tick() {
    const now = Date.now();
    if (now < this.born) return;
    if (!this.appeared) {
      this.appeared = true;
      this.targetAlpha = this.baseAlpha;
    }
    this.alpha += (this.targetAlpha - this.alpha) * 0.03;
    this.x += this.vx;
    this.y += this.vy;
    // wrap around edges
    if (this.x < -200) this.x = WW + 100;
    if (this.x > WW + 200) this.x = -100;
    if (this.y < -40) this.y = WH + 20;
    if (this.y > WH + 40) this.y = -20;
  }

  draw(c) {
    if (this.alpha < 0.005) return;
    c.save();
    c.globalAlpha = this.alpha;
    c.translate(this.x, this.y);
    c.rotate(this.angle);
    c.font = `300 italic ${this.size}px 'Cormorant Garamond', serif`;
    c.fillStyle = '#111';
    c.textAlign = 'center';
    c.fillText(this.text, 0, 0);
    c.restore();
  }
}

// simple seedable RNG
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function strToSeed(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  return h;
}

function wResize() {
  WW = wallCanvas.width  = wallCanvas.offsetWidth;
  WH = wallCanvas.height = wallCanvas.offsetHeight;
}

function wLoop() {
  wctx.clearRect(0, 0, WW, WH);
  wMessages.forEach(m => { m.tick(); m.draw(wctx); });
  wRaf = requestAnimationFrame(wLoop);
}

function buildFloaters(msgs) {
  wMessages = msgs.map((text, i) => new FloatingMsg(text, strToSeed(text + i)));
  wallCount.textContent = msgs.length > 0
    ? `${msgs.length} dream${msgs.length > 1 ? 's' : ''} shared`
    : '';
}

// ── Storage via window.storage (Artifact persistent KV) ──
const STORAGE_KEY = 'dream-wall-messages';

async function loadMessages() {
  try {
    const res = await window.storage.get(STORAGE_KEY, true); // shared=true
    if (res && res.value) {
      return JSON.parse(res.value);
    }
  } catch(e) {}
  return [];
}

async function saveMessages(msgs) {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(msgs), true); // shared=true
  } catch(e) {}
}

let allMessages = [];

async function initWall() {
  if (wallReady) return;
  wallReady = true;

  wResize();
  window.addEventListener('resize', wResize);
  wLoop();

  // load existing
  allMessages = await loadMessages();
  buildFloaters(allMessages);

  // seed a few poetic starter messages if empty
  if (allMessages.length === 0) {
    const seeds = [
      'to wake up without an alarm',
      'a room full of light',
      'to finally finish the painting',
      'a train ride with no destination',
      'to call my mom more',
    ];
    allMessages = seeds;
    await saveMessages(allMessages);
    buildFloaters(allMessages);
  }
}

async function submitDream() {
  const text = wallInput.value.trim();
  if (!text) return;

  wallSend.disabled = true;
  wallStatus.textContent = '…';

  // Add to storage
  allMessages = await loadMessages();
  allMessages.push(text);
  await saveMessages(allMessages);

  // Add to canvas immediately
  const newMsg = new FloatingMsg(text, strToSeed(text + allMessages.length));
  newMsg.born = Date.now() + 300;
  wMessages.push(newMsg);
  wallCount.textContent = `${allMessages.length} dream${allMessages.length > 1 ? 's' : ''} shared`;

  wallInput.value = '';
  wallStatus.textContent = 'released ✦';
  setTimeout(() => {
    wallStatus.textContent = '';
    wallSend.disabled = false;
  }, 2000);
}

wallSend.addEventListener('click', submitDream);
wallInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); submitDream(); }
});

// allow typing on mobile
wallInput.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
wallInput.addEventListener('focus', () => {
  // push card up slightly on mobile keyboard open
  setTimeout(() => {
    wallInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 300);
});
</script>
</body>
